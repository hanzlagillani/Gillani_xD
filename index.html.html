<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gillani xD</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:url('background.jpeg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Dark overlay */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    z-index:-1;
}

/* Visitor Counter */
#visitor-counter{
    position:fixed;
    top:15px;
    right:15px;

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);

    color:white;
    padding:10px 15px;
    border-radius:12px;

    font-size:14px;
    backdrop-filter:blur(10px);
    z-index:999;
}

.card{
    width:650px;
    max-width:90%;
    padding:40px;

    text-align:center;

    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.15);
    border-radius:30px;

    box-shadow:
    0 0 25px rgba(255,255,255,0.08),
    inset 0 0 20px rgba(255,255,255,0.02);
}

.profile{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;

    border:4px solid white;

    box-shadow:
    0 0 15px white,
    0 0 40px rgba(255,255,255,.4);

    margin-bottom:20px;
}

h1{
    color:white;
    font-size:4rem;
    text-shadow:0 0 20px white;
    margin-bottom:10px;
}

.status{
    display:inline-block;
    margin-bottom:35px;

    padding:10px 22px;

    border-radius:30px;

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);

    color:white;
    font-size:18px;
}

.dot{
    color:#00ff88;
    margin-right:8px;
}

.icons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.icons a{
    width:80px;
    height:80px;

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;
    font-size:35px;

    border-radius:20px;
    text-decoration:none;

    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.15);

    transition:.3s;
}

.icons a:hover{
    transform:translateY(-6px) scale(1.08);

    box-shadow:0 0 20px rgba(255,255,255,.4);
}

.footer{
    margin-top:35px;
    color:#888;
    font-size:15px;
}

@media(max-width:600px){

    h1{
        font-size:2.5rem;
    }

    .icons a{
        width:65px;
        height:65px;
        font-size:28px;
    }

    .profile{
        width:120px;
        height:120px;
    }

}

</style>
</head>
<body>

<div id="visitor-counter">
    👁 Visits: <span id="count">0</span>
</div>

<div class="card">

    <img src="profilelogo.jpg" class="profile" alt="Gillani">

    <h1>Gillani xD</h1>

    <div class="status">
        <span class="dot">●</span>
        Playing <b>Gillani xD</b>
    </div>

    <div class="icons">

        <!-- Discord -->
        <a href="https://discord.gg/93afZS66" target="_blank">
            <i class="fab fa-discord"></i>
        </a>

        <!-- Instagram -->
        <a href="https://www.instagram.com/hanzla_gillani_/?hl=en" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>

        <!-- YouTube -->
        <a href="https://www.youtube.com/@Gillani_xD" target="_blank">
            <i class="fab fa-youtube"></i>
        </a>

        <!-- Spotify -->
        <a href="https://open.spotify.com/user/31j2qmuy5xbup3kgrm5yflmdyshy?si=0d6ea2427bf64891" target="_blank">
            <i class="fab fa-spotify"></i>
        </a>

        <!-- Steam -->
        <a href="https://steamcommunity.com/profiles/76561198787837896/" target="_blank">
            <i class="fab fa-steam"></i>
        </a>

    </div>

    <div class="footer">
        © Gillani xD
    </div>

</div>

<script>
let count = localStorage.getItem("gillani_visits");

if(!count){
    count = 1;
}else{
    count = parseInt(count) + 1;
}

localStorage.setItem("gillani_visits", count);
document.getElementById("count").innerText = count;
</script>

</body>
</html>
